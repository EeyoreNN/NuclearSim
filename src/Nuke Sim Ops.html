<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=1440"/><title>Nuclear Conflict Simulator — Ops</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
/* Nuke Sim — Tactical C2 */
:root {
  --bg-0: #0a0d10;
  --bg-1: #0f1317;
  --bg-2: #12161b;
  --bg-3: #171c22;
  --bg-4: #1c2229;
  --line-0: #1d2128;
  --line-1: #262b33;
  --line-2: #333943;
  --text-0: #e4e8ee;
  --text-1: #b8c0cb;
  --text-2: #8a94a2;
  --text-3: #5a6471;
  --text-4: #3a4049;
  --friendly: #4a7ab8;
  --friendly-2: #6b9ad6;
  --hostile: #b8514a;
  --hostile-2: #d86f68;
  --unknown: #c4a24a;
  --unknown-2: #d9b85e;
  --success: #5a9a6a;
  --warn: #c47a3a;
  --nato-blue-fill: rgba(74,122,184,0.14);
  --nato-red-fill:  rgba(184,81,74,0.14);
  --nato-yellow-fill: rgba(196,162,74,0.14);

  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.4;
  font-feature-settings: "ss02", "cv11", "tnum";
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
}

button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

/* Layout */
.app {
  display: grid;
  grid-template-rows: 40px 1fr 200px;
  grid-template-columns: 280px 1fr 320px;
  grid-template-areas:
    "header header header"
    "rail-l stage  rail-r"
    "logbar logbar logbar";
  height: 100vh;
  gap: 1px;
  background: var(--line-0);
}
.app > * { background: var(--bg-1); }

/* Header */
.hdr {
  grid-area: header;
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: 18px;
  padding: 0 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line-1);
  font-size: 11px;
}
.hdr-brand {
  display: flex; align-items: center; gap: 10px;
  color: var(--text-0);
  letter-spacing: 0.12em;
  font-weight: 600;
}
.hdr-brand-mark {
  width: 18px; height: 18px;
  border: 1px solid var(--text-2);
  position: relative;
}
.hdr-brand-mark::before, .hdr-brand-mark::after {
  content: ""; position: absolute; background: var(--text-2);
}
.hdr-brand-mark::before { inset: 8px 2px; height: 1px; }
.hdr-brand-mark::after  { inset: 2px 8px; width: 1px; }
.hdr-nav {
  display: flex; gap: 2px;
}
.hdr-nav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-2);
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 10.5px;
}
.hdr-nav button:hover { color: var(--text-0); background: var(--bg-3); }
.hdr-nav button.active { color: var(--text-0); background: var(--bg-3); border-color: var(--line-2); }
.hdr-clock {
  display: flex; gap: 18px; align-items: center;
}
.hdr-clock .lbl { color: var(--text-3); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.hdr-clock .val { color: var(--text-0); font-variant-numeric: tabular-nums; font-weight: 500; }
.hdr-defcon {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  border: 1px solid var(--hostile);
  color: var(--hostile-2);
  letter-spacing: 0.1em;
  font-size: 10.5px;
  text-transform: uppercase;
}
.hdr-defcon .dot {
  width: 6px; height: 6px; background: var(--hostile);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }

.hdr-conn {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-2);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hdr-conn .dot { width: 6px; height: 6px; background: var(--success); }

/* Panels (shared) */
.panel {
  background: var(--bg-1);
  display: flex; flex-direction: column;
  min-height: 0;
}
.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line-1);
  background: var(--bg-2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-2);
  font-size: 10px;
  font-weight: 600;
}
.panel-hdr .count {
  color: var(--text-3);
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: none;
}
.panel-body {
  overflow: auto;
  flex: 1;
  min-height: 0;
}

/* Left rail: nations */
.rail-l { grid-area: rail-l; overflow: hidden; display: flex; flex-direction: column; }

.nation {
  border-bottom: 1px solid var(--line-0);
  padding: 10px 12px;
  cursor: pointer;
  display: block;
  position: relative;
}
.nation:hover { background: var(--bg-2); }
.nation.selected { background: var(--bg-2); }
.nation.selected::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--text-1);
}
.nation-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.nation-flag {
  width: 18px; height: 12px;
  border: 1px solid var(--line-2);
  display: grid;
  align-items: stretch;
  flex-shrink: 0;
}
.nation-code {
  letter-spacing: 0.12em;
  color: var(--text-0);
  font-weight: 600;
  font-size: 11px;
}
.nation-name {
  color: var(--text-3);
  font-size: 10.5px;
  flex: 1;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.nation-side-dot {
  width: 7px; height: 7px; flex-shrink: 0;
}
.nation-side-dot.blue { background: var(--friendly); }
.nation-side-dot.red  { background: var(--hostile); }
.nation-side-dot.yel  { background: var(--unknown); }

.nation-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px 10px;
  margin-top: 4px;
}
.nation-stat {
  display: flex; flex-direction: column;
}
.nation-stat .k {
  color: var(--text-4);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.nation-stat .v {
  color: var(--text-0);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}
.nation-stat .v.dim { color: var(--text-2); }

.nation-meta {
  display: flex; gap: 8px; margin-top: 8px; align-items: center;
  font-size: 9.5px;
  color: var(--text-3);
  letter-spacing: 0.05em;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px;
  border: 1px solid var(--line-2);
  color: var(--text-2);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.chip.ok { border-color: var(--success); color: var(--success); }
.chip.warn { border-color: var(--warn); color: var(--warn); }
.chip.bad { border-color: var(--hostile); color: var(--hostile-2); }
.chip.def { border-color: var(--hostile); color: var(--hostile-2); font-weight: 600; }
.chip.def5 { border-color: var(--success); color: var(--success); }
.chip.def4 { border-color: var(--friendly); color: var(--friendly-2); }
.chip.def3 { border-color: var(--unknown); color: var(--unknown-2); }
.chip.def2 { border-color: var(--warn); color: var(--warn); }
.chip.def1 { border-color: var(--hostile); color: var(--hostile-2); background: rgba(184,81,74,0.08); }

/* Stage / globe */
.stage {
  grid-area: stage;
  position: relative;
  background: var(--bg-0);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
}
.stage svg, .stage svg text { user-select: none; -webkit-user-select: none; }
.globe-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.globe-svg { display: block; user-select: none; -webkit-user-select: none; touch-action: none; }
.globe-svg text { user-select: none; -webkit-user-select: none; pointer-events: none; }
.stage, .stage * { user-select: none; -webkit-user-select: none; }

/* Stage overlays */
.stage-top {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: flex; justify-content: space-between;
  gap: 10px;
  pointer-events: none;
  z-index: 5;
}
.stage-top > * { pointer-events: auto; }

.filter-group {
  background: rgba(18,22,27,0.9);
  backdrop-filter: blur(6px);
  border: 1px solid var(--line-1);
  padding: 6px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  max-width: 560px;
}
.filter-group .grp-label {
  align-self: center;
  color: var(--text-4);
  font-size: 9px;
  padding: 0 6px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.tchip {
  background: transparent;
  border: 1px solid var(--line-2);
  color: var(--text-2);
  padding: 3px 7px;
  cursor: pointer;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.tchip:hover { color: var(--text-0); border-color: var(--text-3); }
.tchip.on { color: var(--text-0); border-color: var(--text-2); background: var(--bg-3); }
.tchip.off { color: var(--text-4); border-color: var(--line-0); }
.tchip .kc { color: var(--text-4); font-size: 9px; margin-left: 2px; }

.stage-metrics {
  position: absolute; right: 10px; bottom: 10px;
  background: rgba(18,22,27,0.92);
  border: 1px solid var(--line-1);
  padding: 10px 12px;
  min-width: 220px;
  z-index: 5;
}
.stage-metrics h4 {
  margin: 0 0 8px;
  color: var(--text-3);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}
.metric-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 3px 0;
  border-bottom: 1px dashed var(--line-0);
  font-size: 11px;
}
.metric-row:last-child { border-bottom: 0; }
.metric-row .k { color: var(--text-3); letter-spacing: 0.05em; text-transform: uppercase; font-size: 9.5px; }
.metric-row .v { color: var(--text-0); font-variant-numeric: tabular-nums; font-weight: 500; }
.metric-row .v.hot { color: var(--hostile-2); }
.metric-row .v.warn { color: var(--warn); }
.metric-row .v.ok { color: var(--success); }

.stage-compass {
  position: absolute; left: 12px; bottom: 12px;
  color: var(--text-4);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stage-scale {
  position: absolute; left: 12px; bottom: 68px;
  z-index: 5;
}

/* Right rail */
.rail-r { grid-area: rail-r; overflow: hidden; display: flex; flex-direction: column; }

.tabs {
  display: flex;
  border-bottom: 1px solid var(--line-1);
  background: var(--bg-2);
}
.tabs button {
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  color: var(--text-3);
  padding: 8px 12px;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-size: 10px;
}
.tabs button.active {
  color: var(--text-0);
  border-bottom-color: var(--text-1);
  background: var(--bg-1);
}

.kv-grid {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 2px 12px;
  padding: 10px 12px;
  font-size: 11px;
}
.kv-grid .k {
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-size: 9.5px;
  padding-top: 2px;
}
.kv-grid .v {
  color: var(--text-0);
  font-variant-numeric: tabular-nums;
  word-break: break-word;
}
.kv-grid .v .sub {
  color: var(--text-3);
  font-size: 10px;
  margin-left: 6px;
}
.kv-grid .v.mono { font-family: var(--mono); }

.sec {
  border-top: 1px solid var(--line-0);
}
.sec-hdr {
  padding: 8px 12px 4px;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 10px;
  font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}

.bar {
  height: 4px;
  background: var(--bg-3);
  position: relative;
  overflow: hidden;
}
.bar > span {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--text-1);
}
.bar.ok > span { background: var(--success); }
.bar.warn > span { background: var(--warn); }
.bar.bad > span { background: var(--hostile); }
.bar.friendly > span { background: var(--friendly); }

.inspector-empty {
  padding: 24px 14px;
  color: var(--text-3);
  font-size: 11px;
  text-align: center;
}
.inspector-empty .mark {
  display: block;
  margin: 0 auto 14px;
  width: 40px; height: 40px;
  border: 1px dashed var(--line-2);
  position: relative;
}
.inspector-empty .mark::before, .inspector-empty .mark::after {
  content: ""; position: absolute; background: var(--line-2);
}
.inspector-empty .mark::before { inset: 19px 6px; height: 1px; }
.inspector-empty .mark::after  { inset: 6px 19px; width: 1px; }

.watch-row {
  display: grid;
  grid-template-columns: 20px 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--line-0);
  cursor: pointer;
  font-size: 11px;
}
.watch-row:hover { background: var(--bg-2); }
.watch-row .sub { color: var(--text-3); font-size: 10px; }
.watch-row .state {
  color: var(--text-2);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Bottom: log + controls */
.logbar {
  grid-area: logbar;
  background: var(--bg-1);
  border-top: 1px solid var(--line-1);
  display: grid;
  grid-template-columns: 1fr 360px;
  min-height: 0;
}
.log { border-right: 1px solid var(--line-0); display: flex; flex-direction: column; min-height: 0; }
.log-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--line-1);
  background: var(--bg-2);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
}
.log-filters {
  display: flex; gap: 4px;
  flex: 1;
}
.log-body {
  flex: 1;
  overflow: auto;
  font-size: 10.5px;
  font-variant-numeric: tabular-nums;
}
.log-row {
  display: grid;
  grid-template-columns: 80px 90px 1fr;
  gap: 10px;
  padding: 3px 12px;
  border-bottom: 1px dashed var(--line-0);
  color: var(--text-1);
}
.log-row:hover { background: var(--bg-2); }
.log-row .t { color: var(--text-3); }
.log-row .kind {
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 9.5px;
  color: var(--text-2);
}
.log-row .kind.launch { color: var(--unknown-2); }
.log-row .kind.detect { color: var(--friendly-2); }
.log-row .kind.track  { color: var(--friendly-2); }
.log-row .kind.engage { color: var(--warn); }
.log-row .kind.intercept_hit { color: var(--success); }
.log-row .kind.intercept_miss { color: var(--hostile-2); }
.log-row .kind.detonation { color: var(--hostile-2); font-weight: 600; }
.log-row .kind.reentry { color: var(--text-2); }
.log-row .kind.emp { color: var(--hostile-2); }
.log-row .kind.sink { color: var(--hostile-2); }
.log-row .msg { color: var(--text-1); }
.log-row .msg em { color: var(--text-0); font-style: normal; }

.controls {
  display: flex; flex-direction: column;
  background: var(--bg-2);
}
.controls-row {
  display: flex; gap: 4px; align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line-0);
}
.controls-row .lbl {
  color: var(--text-3);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  min-width: 68px;
}
.btn {
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  color: var(--text-1);
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 10px;
}
.btn:hover { border-color: var(--text-3); color: var(--text-0); }
.btn.primary {
  background: var(--hostile);
  border-color: var(--hostile);
  color: #fff;
  font-weight: 600;
}
.btn.primary:hover { background: var(--hostile-2); border-color: var(--hostile-2); }
.btn.ghost {
  background: transparent;
  color: var(--text-2);
}
.btn.active { background: var(--bg-4); border-color: var(--text-3); color: var(--text-0); }
.btn.sm { padding: 3px 7px; font-size: 9.5px; }

.scrubber {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
}
.scrubber .track {
  flex: 1;
  height: 4px;
  background: var(--bg-3);
  position: relative;
  cursor: pointer;
}
.scrubber .track .fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--text-2);
}
.scrubber .track .thumb {
  position: absolute;
  top: -4px;
  width: 2px; height: 12px;
  background: var(--text-0);
  transform: translateX(-1px);
}
.scrubber .track .event-mark {
  position: absolute; top: -2px; bottom: -2px;
  width: 1px;
  background: var(--hostile);
  opacity: 0.7;
}
.scrubber .track .event-mark.det { background: var(--hostile); opacity: 1; }
.scrubber .track .event-mark.lau { background: var(--unknown); }
.scrubber .t { color: var(--text-3); font-size: 10px; font-variant-numeric: tabular-nums; width: 60px; text-align: right; }

.time-scale {
  display: flex; align-items: center; gap: 6px;
}
.time-scale input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 120px;
  height: 4px;
  background: var(--bg-3);
  outline: none;
}
.time-scale input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px; height: 12px;
  background: var(--text-0);
  cursor: pointer;
  border-radius: 0;
}
.time-scale input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--text-0);
  cursor: pointer;
  border: 0;
  border-radius: 0;
}
.time-scale .v {
  color: var(--text-0);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  min-width: 40px;
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(5,7,9,0.7);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  width: min(860px, 92vw);
  max-height: 88vh;
  display: flex; flex-direction: column;
}
.modal-hdr {
  padding: 10px 16px;
  border-bottom: 1px solid var(--line-1);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-2);
}
.modal-hdr h2 {
  margin: 0;
  color: var(--text-0);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 600;
  display: flex; align-items: center; gap: 10px;
}
.modal-hdr .classification {
  color: var(--hostile-2);
  border: 1px solid var(--hostile);
  padding: 1px 6px;
  font-size: 9.5px;
  letter-spacing: 0.15em;
  font-weight: 700;
}
.modal-body {
  padding: 16px;
  overflow: auto;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.modal-ftr {
  padding: 10px 16px;
  border-top: 1px solid var(--line-1);
  background: var(--bg-2);
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px;
}
.close-x {
  background: transparent; border: 0; color: var(--text-3); cursor: pointer; font-size: 14px;
  padding: 2px 6px;
}
.close-x:hover { color: var(--text-0); }

.form-sec {
  border: 1px solid var(--line-1);
  padding: 10px 12px;
}
.form-sec h3 {
  margin: 0 0 8px;
  color: var(--text-2);
  font-size: 10px;

// Live WebSocket client — wires the UI to the real Python backend.
//
// Protocol: ws://localhost:8765/stream (matches FRONTEND_REQUIREMENTS.md §2)
// Frames we consume: hello, tick, event, entity_spawn, metrics, inspect, ack
// Commands we send:  pause, resume, set_time_scale, launch_order, aircraft_order,
//                    ship_order, sub_order, nation_posture, inspect
//
// Usage:
//   SimLive.connect({ url, onState, onEvents, onMetrics, onStatus })
//   SimLive.send({ cmd: 'launch_order', ... })

(function () {
  const DEFAULT_URL = 'ws://localhost:8765/stream';
  const RECONNECT_MS = 2000;

  let ws = null;
  let url = DEFAULT_URL;
  let queue = [];              // commands queued while disconnected
  let handlers = {};
  let reconnectTimer = null;
  let status = 'idle';         // idle | connecting | live | error | closed | fallback
  let lastHello = null;
  let entities = {};           // id -> entity (current snapshot)
  let cities = {};
  let nations = [];
  let eventBuffer = [];        // last N events
  let metrics = null;
  const MAX_EVENTS = 500;

  function setStatus(s, detail) {
    status = s;
    handlers.onStatus && handlers.onStatus(s, detail);
  }

  function connect(opts = {}) {
    handlers = opts;
    url = opts.url || DEFAULT_URL;
    _open();
  }

  function _open() {
    if (ws) { try { ws.close(); } catch(e){} }
    setStatus('connecting');
    try {
      ws = new WebSocket(url);
    } catch (e) {
      setStatus('error', e.message);
      _scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      setStatus('live');
      // Flush any queued commands
      for (const m of queue) ws.send(JSON.stringify(m));
      queue = [];
    };
    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch(e) { return; }
      _handleFrame(msg);
    };
    ws.onclose = () => {
      setStatus('closed');
      _scheduleReconnect();
    };
    ws.onerror = (e) => {
      setStatus('error');
    };
  }

  function _scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      _open();
    }, RECONNECT_MS);
  }

  function _handleFrame(msg) {
    const { type, t, seq, payload } = msg;
    if (type === 'hello') {
      lastHello = payload;
      entities = {};
      cities = {};
      nations = (payload.nations || []).slice();
      for (const e of (payload.entities || [])) entities[e.id] = e;
      for (const c of (payload.cities || [])) cities[c.id] = c;
      handlers.onState && handlers.onState({
        kind:'hello', t, entities, cities, nations, hello: payload,
      });
    } else if (type === 'tick') {
      const updates = payload.updates || [];
      const removed = payload.removed || [];
      for (const u of updates) {
        const cur = entities[u.id];
        if (cur) Object.assign(cur, u);
        else entities[u.id] = u;
      }
      for (const id of removed) delete entities[id];
      handlers.onState && handlers.onState({ kind:'tick', t, entities, removed });
    } else if (type === 'entity_spawn') {
      entities[payload.id] = payload;
      handlers.onState && handlers.onState({ kind:'spawn', t, entities });
    } else if (type === 'event') {
      const evt = { t, ...payload };
      eventBuffer.push(evt);
      if (eventBuffer.length > MAX_EVENTS) eventBuffer.shift();
      handlers.onEvents && handlers.onEvents(eventBuffer.slice());
    } else if (type === 'metrics') {
      metrics = payload;
      handlers.onMetrics && handlers.onMetrics(payload, t);
    } else if (type === 'inspect') {
      handlers.onInspect && handlers.onInspect(payload);
    } else if (type === 'ack') {
      handlers.onAck && handlers.onAck(payload);
    }
  }

  function send(cmd) {
    const msg = typeof cmd === 'string' ? { cmd } : cmd;
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify(msg));
    } else {
      queue.push(msg);
    }
  }

  function disconnect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (ws) { try { ws.close(); } catch(e){} ws = null; }
    setStatus('idle');
  }

  function snapshot() {
    return {
      status, url,
      entities: Object.values(entities),
      cities: Object.values(cities),
      nations, events: eventBuffer.slice(), metrics, hello: lastHello,
    };
  }

  window.SimLive = { connect, send, disconnect, snapshot, get status() { return status; } };
})();

// Orthographic globe — pure SVG, no external deps.
// Supports: country outlines (coarse), graticule, entity markers, great-circle arcs,
// SAM/ABM domes, radar rings, detonation rings, pan (drag to rotate), zoom.

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ---- Orthographic projection ----
// Rotate lambda (long) by -lon0, phi (lat) by -lat0, then project.
// Returns [x, y, visible]
function project(lat, lon, rotLon, rotLat, radius) {
  const dlon = (lon - rotLon) * Math.PI / 180;
  const la = lat * Math.PI / 180;
  const la0 = rotLat * Math.PI / 180;
  const cosc = Math.sin(la0) * Math.sin(la) + Math.cos(la0) * Math.cos(la) * Math.cos(dlon);
  if (cosc < -1e-6) return [0, 0, false];
  const x = radius * Math.cos(la) * Math.sin(dlon);
  const y = radius * (Math.cos(la0) * Math.sin(la) - Math.sin(la0) * Math.cos(la) * Math.cos(dlon));
  return [x, -y, true];
}

// Great-circle interpolation points
function gcPath(a, b, n = 48) {
  const [lat1, lon1] = a, [lat2, lon2] = b;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const λ1 = lon1 * Math.PI/180, λ2 = lon2 * Math.PI/180;
  const Δ = 2 * Math.asin(Math.sqrt(
    Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2
  ));
  if (Δ < 1e-9) return [[lat1, lon1]];
  const out = [];
  for (let i = 0; i <= n; i++) {
    const f = i/n;
    const A = Math.sin((1-f)*Δ) / Math.sin(Δ);
    const B = Math.sin(f*Δ) / Math.sin(Δ);
    const x = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
    const y = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
    const z = A*Math.sin(φ1) + B*Math.sin(φ2);
    const φ = Math.atan2(z, Math.sqrt(x*x+y*y));
    const λ = Math.atan2(y, x);
    out.push([φ*180/Math.PI, λ*180/Math.PI]);
  }
  return out;
}

// Build a projected polyline, splitting where it leaves the visible hemisphere.
function projectPolyline(coords, rotLon, rotLat, R, cx, cy) {
  const segs = [];
  let cur = [];
  for (const [lat, lon] of coords) {
    const [x, y, v] = project(lat, lon, rotLon, rotLat, R);
    if (v) cur.push([x+cx, y+cy]);
    else { if (cur.length > 1) segs.push(cur); cur = []; }
  }
  if (cur.length > 1) segs.push(cur);
  return segs;
}

function pathFromSegs(segs) {
  return segs.map(s => 'M' + s.map(p => p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L') + ' Z').join(' ');
}

// Radius on screen from km distance at the tangent point (approx)
function kmToPx(km, R) {
  const earthKm = 6371;
  // arc length ≈ angle (rad) * R(screen)
  const angle = km / earthKm;
  return Math.sin(angle) * R;
}

// ---- Globe component ----
function Globe({
  width, height,
  nations, cities, entities, detonations, events,
  selectedId, onSelect,
  filters, overlays,
  playheadT,
  onHoverEntity,
  countriesData,
}) {
  const [rot, setRot] = useState({ lon: -30, lat: 20 });
  const [zoom, setZoom] = useState(1.0);
  const [drag, setDrag] = useState(null);
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null);
  const [tick, setTick] = useState(0);

  // Animate (very slight — missiles move along arcs)
  useEffect(() => {
    let raf;
    const loop = () => { setTick(t => t + 1); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const cx = width/2, cy = height/2;
  const baseR = Math.min(width, height) * 0.42;
  const R = baseR * zoom;

  // --- Mouse handlers ---
  const onMouseDown = (e) => {
    setDrag({ x: e.clientX, y: e.clientY, rot: { ...rot } });
  };
  const onMouseMove = (e) => {
    if (!drag) return;
    const dx = e.clientX - drag.x;
    const dy = e.clientY - drag.y;
    setRot({
      lon: drag.rot.lon - dx * 0.3 / zoom,
      lat: Math.max(-85, Math.min(85, drag.rot.lat + dy * 0.3 / zoom)),
    });
  };
  const onMouseUp = () => setDrag(null);
  const onWheel = (e) => {
    // Only zoom when user holds Shift or Ctrl/Cmd — otherwise let page scroll
    if (!(e.shiftKey || e.ctrlKey || e.metaKey)) return;
    e.preventDefault();
    const d = e.deltaY > 0 ? 0.9 : 1.1;
    setZoom(z => Math.max(0.55, Math.min(4, z * d)));
  };
  const zoomIn  = () => setZoom(z => Math.min(4, z * 1.2));
  const zoomOut = () => setZoom(z => Math.max(0.55, z / 1.2));
  const resetView = () => { setZoom(1); setRot({ lon:-30, lat:20 }); };

  // --- Graticule ---
  const graticule = useMemo(() => {
    const paths = [];
    for (let lat = -80; lat <= 80; lat += 20) {
      const line = [];
      for (let lon = -180; lon <= 180; lon += 4) line.push([lat, lon]);
      paths.push(line);
    }
    for (let lon = -180; lon <= 180; lon += 20) {
      const line = [];
      for (let lat = -85; lat <= 85; lat += 4) line.push([lat, lon]);
      paths.push(line);
    }
    return paths;
  }, []);

  // --- Project countries on each render ---
  const countryPath = useMemo(() => {
    if (!countriesData) return '';
    const parts = [];
    for (const ring of countriesData) {
      const segs = projectPolyline(ring, rot.lon, rot.lat, R, cx, cy);
      if (segs.length) parts.push(pathFromSegs(segs));
    }
    return parts.join(' ');
  }, [countriesData, rot.lon, rot.lat, R, cx, cy]);

  const gratPath = useMemo(() => {
    const parts = [];
    for (const line of graticule) {
      const segs = projectPolyline(line, rot.lon, rot.lat, R, cx, cy);
      if (segs.length) parts.push(pathFromSegs(segs));
    }
    return parts.join(' ');
  }, [graticule, rot.lon, rot.lat, R, cx, cy]);

  // Filter entities
  const visibleEntities = entities.filter(e => {
    if (filters.classes && !filters.classes[e.cls] && !Object.values(filters.classes).every(v=>!v)) {
      // If a class filter is set and this class isn't in it, hide
      if (!filters.classes[e.cls]) return false;
    }
    if (filters.sides && !filters.sides[e.side]) return false;
    return true;
  });

  // Project entities
  const projectedEntities = visibleEntities.map(e => {
    const [lat, lon] = e.pos;
    const [x, y, v] = project(lat, lon, rot.lon, rot.lat, R);
    return { ent: e, x: x+cx, y: y+cy, visible: v };
  }).filter(p => p.visible);

  // Project cities
  const projectedCities = cities.map(c => {
    const [lat, lon] = c.pos;
    const [x, y, v] = project(lat, lon, rot.lon, rot.lat, R);
    return { city: c, x: x+cx, y: y+cy, visible: v };
  }).filter(p => p.visible);

  // Arcs for in-flight missiles
  const missiles = visibleEntities.filter(e =>
    ['icbm','slbm','mrbm','srbm','cruise_alcm','cruise_slcm','cruise_glcm','abm_interceptor','sam_interceptor'].includes(e.cls)
    && e.origin && e.destination
  );

  // --- Render ---
  // Listen for external zoom commands
  useEffect(() => {
    const h = (e) => {
      if (e.detail === 'in') zoomIn();
      else if (e.detail === 'out') zoomOut();
      else if (e.detail === 'reset') resetView();
    };
    window.addEventListener('globe-zoom', h);
    return () => window.removeEventListener('globe-zoom', h);
  }, []);

  return (
    <svg
      ref={svgRef}
      className="globe-svg"
      width={width} height={height}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
      onWheel={onWheel}
      style={{ cursor: drag ? 'grabbing' : 'grab' }}
    >
      <defs>
        <clipPath id="globe-clip">
          <circle cx={cx} cy={cy} r={R} />
        </clipPath>
        <radialGradient id="ocean" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#0d1217"/>
          <stop offset="70%" stopColor="#0a0d11"/>
          <stop offset="100%" stopColor="#060809"/>
        </radialGradient>
        <filter id="det-blur"><feGaussianBlur stdDeviation="0.5"/></filter>
      </defs>

      {/* Limb / ocean */}
      <circle cx={cx} cy={cy} r={R} fill="url(#ocean)" stroke="#2a323c" strokeWidth="1"/>

      <g clipPath="url(#globe-clip)">
        {/* Graticule */}
        <path d={gratPath} fill="none" stroke="#1a2028" strokeWidth="0.5" opacity="0.7"/>

        {/* Countries — fill + same-color stroke so internal borders blend but coastlines stay crisp */}
        {countryPath && (
          <path d={countryPath} fill="#151c25" stroke="#151c25" strokeWidth="1.2" strokeLinejoin="round" strokeLinecap="round"/>
        )}
        {/* Coastline overlay — faint contour line */}
        {countryPath && (
          <path d={countryPath} fill="none" stroke="#3a4553" strokeWidth="0.35" strokeOpacity="0.7" strokeLinejoin="round"/>
        )}

        {/* Radar rings (sensors) */}
        {overlays.radar && entities.filter(e =>
          (e.cls === 'radar_site' || e.cls === 'abm_site' || e.cls === 'satellite_early_warning' || e.cls === 'oth_radar')
          && e.radar_range_km
        ).map(e => {
          const [lat, lon] = e.pos;
          const [x, y, v] = project(lat, lon, rot.lon, rot.lat, R);
          if (!v) return null;
          const r = kmToPx(e.radar_range_km, R);
          const c = window.NATO.colorFor(e.side);
          return (
            <g key={'r-'+e.id} transform={`translate(${x+cx},${y+cy})`}>
              <circle r={r} fill="none" stroke={c.stroke} strokeWidth="0.7" strokeDasharray="3 3" opacity="0.35"/>
              <circle r={r*0.5} fill="none" stroke={c.stroke} strokeWidth="0.4" strokeDasharray="2 4" opacity="0.2"/>
            </g>
          );
        })}

        {/* SAM/ABM coverage domes */}
        {overlays.domes && entities.filter(e => e.cls === 'sam_site' || e.cls === 'abm_site').map(e => {
          const [lat, lon] = e.pos;
          const [x, y, v] = project(lat, lon, rot.lon, rot.lat, R);
          if (!v) return null;
          const r = kmToPx(e.cls === 'abm_site' ? 1800 : (e.sub?.includes('S-400') ? 400 : 170), R);
          const c = window.NATO.colorFor(e.side);
          return (
            <g key={'d-'+e.id} transform={`translate(${x+cx},${y+cy})`}>
              <circle r={r} fill={c.fill} stroke={c.stroke} strokeWidth="0.8" opacity="0.5"/>
            </g>
          );
        })}

        {/* Detonation rings — 3rd-deg thermal, psi5, psi20 */}
        {detonations.map(d => {
          const [lat, lon] = d.pos;
          const [x, y, v] = project(lat, lon, rot.lon, rot.lat, R);
          if (!v) return null;
          const rTherm = kmToPx(d.thermal_3rd_deg_radius_km, R);
          const rPsi5 = kmToPx(d.psi5_radius_km, R);
          const rPsi20 = kmToPx(d.psi20_radius_km, R);
          return (
            <g key={'det-'+d.id} transform={`translate(${x+cx},${y+cy})`}>
              <circle r={rTherm} fill="rgba(196,122,58,0.08)" stroke="#c47a3a" strokeWidth="0.5" strokeDasharray="2 2"/>
              <circle r={rPsi5} fill="rgba(184,81,74,0.12)" stroke="#b8514a" strokeWidth="0.7"/>
              <circle r={rPsi20} fill="rgba(184,81,74,0.35)" stroke="#d86f68" strokeWidth="0.7"/>
              <circle r={2} fill="#f2a672"/>
              <circle r={6} fill="none" stroke="#c47a3a" strokeWidth="0.5"/>
            </g>
          );
        })}

        {/* Trajectories — great-circle arcs */}
        {overlays.arcs && missiles.map(m => {
          const pts = gcPath(m.origin, m.destination, 60);
          // split at progress index
          const cutIdx = Math.floor(m.progress * pts.length);
          const pastPts = pts.slice(0, cutIdx+1);
          const futurePts = pts.slice(cutIdx);
          const segPast = projectPolyline(pastPts, rot.lon, rot.lat, R, cx, cy);
          const segFuture = projectPolyline(futurePts, rot.lon, rot.lat, R, cx, cy);
          const c = window.NATO.colorFor(m.side);
          const isInterceptor = m.cls === 'abm_interceptor' || m.cls === 'sam_interceptor';
          return (
            <g key={'arc-'+m.id}>
              <path d={pathFromSegs(segPast)} fill="none"
                stroke={isInterceptor ? '#5a9a6a' : c.stroke}
                strokeWidth="1.2" opacity="0.85"/>
              <path d={pathFromSegs(segFuture)} fill="none"
                stroke={isInterceptor ? '#5a9a6a' : c.stroke}
                strokeWidth="0.8" strokeDasharray="3 3" opacity="0.45"/>
            </g>
          );
        })}

        {/* Cities */}
        {projectedCities.map(({ city, x, y }) => {
          const struck = detonations.some(d => d.target_city === city.id);
          return (
            <g key={'city-'+city.id} transform={`translate(${x},${y})`} style={{ cursor: 'pointer' }}
               onClick={(e) => { e.stopPropagation(); onSelect('city:'+city.id); }}>
              {city.is_capital && (
                <circle r={3.8} fill="none" stroke="#8a94a2" strokeWidth="0.8"/>
              )}
              <circle r={struck ? 2.5 : 1.5} fill={struck ? '#d86f68' : (city.is_capital ? '#d8dde4' : '#6a727c')}/>
              {(zoom > 1.1 || city.is_capital) && (
                <text x={5} y={3} fontSize="9" fill={struck ? '#d86f68' : '#9ba3ad'}
                  style={{ pointerEvents:'none', letterSpacing:'0.05em' }}>
                  {city.name.toUpperCase()}
                </text>
              )}
            </g>
          );
        })}

        {/* Entities */}
        {projectedEntities.map(({ ent, x, y }) => {
          const size = classSize(ent.cls);
          const sel = selectedId === ent.id;
          const c = window.NATO.colorFor(ent.side);
          const html = window.NATO.renderIcon({ cls: ent.cls, side: ent.side, size, state: ent.state });
          return (
            <g key={ent.id} transform={`translate(${x-size/2},${y-size/2})`}
               style={{ cursor:'pointer' }}
               onClick={(e) => { e.stopPropagation(); onSelect(ent.id); }}
               onMouseEnter={() => { setHover({ x: x, y: y, ent }); onHoverEntity && onHoverEntity(ent); }}
               onMouseLeave={() => { setHover(null); onHoverEntity && onHoverEntity(null); }}
               dangerouslySetInnerHTML={{ __html:
                 (sel ? `<rect x="-3" y="-3" width="${size+6}" height="${size+6}" fill="none" stroke="${c.stroke}" stroke-width="1"/>` : '')
                 + html
               }}
            />
          );
        })}

        {/* Hover tooltip line (to readout) */}
        {hover && (
          <line x1={hover.x} y1={hover.y} x2={hover.x + 30} y2={hover.y - 20}
            stroke="#5a6471" strokeWidth="0.6" strokeDasharray="2 2"/>
        )}
      </g>

      {/* Limb highlight */}
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#3a4049" strokeWidth="0.6"/>

      {/* Bearing ticks */}
      {[0,45,90,135,180,225,270,315].map(deg => {
        const a = (deg - 90) * Math.PI/180;
        const x1 = cx + Math.cos(a) * (R+2);
        const y1 = cy + Math.sin(a) * (R+2);
        const x2 = cx + Math.cos(a) * (R+7);
        const y2 = cy + Math.sin(a) * (R+7);
        const lx = cx + Math.cos(a) * (R+16);
        const ly = cy + Math.sin(a) * (R+16);
        return (
          <g key={deg}>
            <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#3a4049" strokeWidth="0.8"/>
            <text x={lx} y={ly} fontSize="8.5" fill="#5a6471" textAnchor="middle" dominantBaseline="middle"
              style={{ letterSpacing:'0.1em' }}>
              {String(deg).padStart(3,'0')}
            </text>
          </g>
        );
      })}

      {/* Center cursor (when hovering stage but not on entity) */}
      {!hover && (
        <g opacity="0.15">
          <line x1={cx-10} y1={cy} x2={cx+10} y2={cy} stroke="#8a94a2"/>
          <line x1={cx} y1={cy-10} x2={cx} y2={cy+10} stroke="#8a94a2"/>
        </g>
      )}
    </svg>
  );
}

function classSize(cls) {
  if (['icbm','slbm','mrbm'].includes(cls)) return 14;
  if (['cruise_alcm','cruise_slcm','cruise_glcm','srbm','abm_interceptor','sam_interceptor'].includes(cls)) return 12;
  if (['carrier','ssbn'].includes(cls)) return 18;
  if (['bomber','awacs','tanker'].includes(cls)) return 16;
  if (['city'].includes(cls)) return 6;
  return 14;
}

// Expose zoom controls via imperative ref pattern — use DOM custom event
window.Globe = Globe;
window.project = project;
window.gcPath = gcPath;

</script><script type="text/babel">
// UI panels — nations rail, inspector, event log, controls, modals.

const { useState: useS, useEffect: useE, useMemo: useM, useRef: useR } = React;

// ---- Left rail: nations ----

function Stat({ k, v, hot }) {

// ---- Right rail: inspector / watchlist ----
function RightRail({ sel, entitiesById, citiesById, detonations, watchlist, onOpenInspector, onAddWatch, onRemoveWatch }) {

      </div>
      {tab === 'inspect' && (

function InspectorPanel({ sel, entitiesById, citiesById, detonations, onAddWatch, onExpand }) {

        <div className="inspector-empty">
          <div className="mark"/>
          NO ENTITY SELECTED
          <div style={{ marginTop: 10, color:'var(--text-4)', fontSize: 10, letterSpacing:'0.1em' }}>

          <div style={{ color:'var(--text-3)', fontSize: 10, marginTop: 2, fontVariantNumeric:'tabular-nums' }}>

      </div>

      <div className="kv-grid">
        <span className="k">Class</span><span className="v">{e.cls}</span>
        <span className="k">Sub</span><span className="v">{e.sub}</span>
        <span className="k">State</span><span className="v">{e.state || '—'}</span>

        <span className="v mono">{fmtLat(e.pos[0])} / {fmtLon(e.pos[1])}</span>
        <span className="k">Altitude</span>
        <span className="v mono">{formatAlt(e.pos[2])}</span>
        {e.hp != null && <>
          <span className="k">Integrity</span>
          <span className="v">{(e.hp*100).toFixed(0)}%
            <div className="bar ok" style={{ marginTop: 3 }}><span style={{ width:(e.hp*100)+'%' }}/></div>
          </span>
        </>}

          <span className="k">Fuel</span>
          <span className="v">{(e.fuel*100).toFixed(0)}%
            <div className="bar friendly" style={{ marginTop: 3 }}><span style={{ width:(e.fuel*100)+'%' }}/></div>
          </span>
        </>}
      </div>

      {/* Missile-specific */}
      {['icbm','slbm','mrbm','srbm','cruise_alcm','cruise_slcm','cruise_glcm','abm_interceptor','sam_interceptor'].includes(e.cls) && (
        <div className="sec">
          <div className="sec-hdr">Flight</div>
          <div className="kv-grid">
            {e.apogee_m != null && <><span className="k">Apogee</span><span className="v mono">{(e.apogee_m/1000).toFixed(0)} km</span></>}
            {e.impact_eta_s != null && <><span className="k">Impact ETA</span><span className="v mono">T+{fmtDur(e.impact_eta_s)}</span></>}
            {e.warheads_count != null && <><span className="k">Warheads</span><span className="v">{e.warheads_count}{e.is_mirv ? ' MIRV' : ''}</span></>}
            {e.origin && <><span className="k">Origin</span><span className="v mono">{fmtLat(e.origin[0])} / {fmtLon(e.origin[1])}</span></>}
            {e.destination && <><span className="k">Target</span><span className="v mono">{fmtLat(e.destination[0])} / {fmtLon(e.destination[1])}</span></>}
            {e.intercepting && <><span className="k">Vs Target</span><span className="v" style={{ color:'var(--warn)' }}>{e.intercepting}</span></>}
          </div>
        </div>
      )}

      {/* Aircraft-specific */}
      {['fighter','bomber','awacs','tanker','elint','combat_uav','recon_uav'].includes(e.cls) && (
        <div className="sec">
          <div className="sec-hdr">Platform</div>
          <div className="kv-grid">
            {e.callsign && <><span className="k">Callsign</span><span className="v">{e.callsign}</span></>}
            {e.radar_on != null && <><span className="k">Radar</span><span className="v">{e.radar_on ? 'ACTIVE' : 'SILENT'}</span></>}

      {['carrier','destroyer','cruiser','frigate','ssbn','ssn','ssk'].includes(e.cls) && (

          {e.vls_cells && e.vls_cells.loaded && (
            <div style={{ padding: '0 12px 12px', fontSize: 11 }}>

                <div key={k} className="row" style={{ justifyContent:'space-between', padding:'3px 0', borderBottom:'1px dashed var(--line-0)' }}>

      {['silo','tel','sam_site','abm_site','radar_site'].includes(e.cls) && (
        <div className="sec">

      <div style={{ padding: '10px 12px', display:'flex', gap: 6, borderTop:'1px solid var(--line-0)' }}>
        <button className="btn sm" onClick={()=>onAddWatch(e.id)}>+ Watchlist</button>
        <button className="btn sm" onClick={()=>onExpand(e.id)}>Full Inspect ↗</button>
      </div>
    </div>
  );
}

function CityInspector({ c, det }) {

function WatchPanel({ watchlist, entitiesById, onSelect, onRemove }) {
  if (!watchlist.length) {

      <div className="panel-body">
        <div className="inspector-empty">
          <div className="mark"/>
          WATCHLIST EMPTY

    <div className="panel-body">
      {watchlist.map(id => {

        if (!e) return null;
        return (
          <div key={id} className="watch-row" onClick={()=>onSelect(id)}>

            <div>
              <div style={{ color:'var(--text-0)' }}>{e.name || e.sub}</div>
              <div className="sub">{e.cls.toUpperCase()} · {e.sub}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap: 2 }}>
              <div className="state">30Hz</div>
              <button className="btn sm ghost" style={{ fontSize: 9, padding:'1px 4px' }}
                onClick={(ev)=>{ ev.stopPropagation(); onRemove(id); }}>×</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---- Event log ----
function EventLog({ events, playheadT, filters, onToggleFilter, onEventClick }) {
  const bodyRef = useR(null);
  const visible = events.filter(e => filters[e.kind] !== false && e.t <= playheadT);
  useE(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [visible.length]);

  const kinds = ['launch','detect','track','engage','intercept_hit','intercept_miss','detonation','c2_link_lost','casualty_update'];
  return (
    <div className="log">
      <div className="log-hdr">

}

function catalogMock(e) {
  return {
    model: e.sub,
    manufacturer: e.side === 'usa' ? 'NORTHROP GRUMMAN' : e.side === 'rus' ? 'MIT' : 'CASIC',
    ioc: 1998 + (e.cls.charCodeAt(0) % 20),
    yield_kt: e.cls.startsWith('icbm') || e.cls.startsWith('slbm') ? [300, 455, 800][e.cls.length % 3] : null,
    range_km: ['icbm','slbm'].includes(e.cls) ? 11000 : e.cls.startsWith('cruise') ? 2500 : 800,
    rcs_m2: e.stealth_rcs_m2 || 0.8,
  };
}

function HistorySparkline({ history, color }) {
  const w = 240, h = 50;
  const xs = history.map((_, i) => i / (history.length-1) * w);
  const alts = history.map(p => p.alt || 0);
  const maxA = Math.max(1, ...alts);
  const pts = history.map((p, i) => [xs[i], h - (p.alt/maxA)*h*0.9]);
  const d = 'M' + pts.map(p => p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
  return (
    <svg width={w} height={h} style={{ marginTop: 6, background: 'var(--bg-0)', border: '1px solid var(--line-0)' }}>
      {[0.25, 0.5, 0.75].map(p => (
        <line key={p} x1={0} x2={w} y1={h*p} y2={h*p} stroke="var(--line-0)" strokeDasharray="2 3"/>
      ))}
      <path d={d} fill="none" stroke={color} strokeWidth="1"/>
    </svg>
  );
}

// ---- Formatting ----
function formatNum(n) {
  if (n == null) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(n > 10000000 ? 0 : 1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(n > 10000 ? 0 : 1) + 'k';
  return n.toLocaleString();
}
function formatAlt(m) {
  if (m == null) return '—';
  if (m === 0) return 'SURF';
  if (m < 0) return m + ' m SUB';
  if (m >= 1000000) return (m/1000000).toFixed(2) + ' Mm';
  if (m >= 1000) return (m/1000).toFixed(1) + ' km';
  return m.toFixed(0) + ' m';
}
function fmtLat(v) {
  const a = Math.abs(v);
  const d = Math.floor(a);
  const m = (a - d) * 60;
  return `${d.toString().padStart(2,'0')}°${m.toFixed(2).padStart(5,'0')}' ${v>=0?'N':'S'}`;
}
function fmtLon(v) {
  const a = Math.abs(v);
  const d = Math.floor(a);
  const m = (a - d) * 60;
  return `${d.toString().padStart(3,'0')}°${m.toFixed(2).padStart(5,'0')}' ${v>=0?'E':'W'}`;
}
function fmtDur(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const ss = s%60;
  if (h > 0) return `${h}h${m.toString().padStart(2,'0')}m${ss.toString().padStart(2,'0')}s`;
  return `${m.toString().padStart(2,'0')}m${ss.toString().padStart(2,'0')}s`;
}

                <span>Alt <strong className="mono" style={{ color:'var(--text-0)' }}>{formatAlt(ac.pos[2])}</strong></span>
              </div>
            )}
          </div>
          <div className="form-sec">
            <h3><span>02 · Order</span></h3>
            <div className="radio-list">
              {orders.map(o => (
                <label key={o.id} className={order===o.id?'checked':''}>
                  <input type="radio" name="ao" checked={order===o.id} onChange={()=>setOrder(o.id)}/>
                  <div>
                    <div className="title">{o.title}</div>
                    <div className="desc">{o.desc}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>
          {order !== 'rtb' && (
            <div className="form-sec">
              <h3><span>03 · Params</span></h3>
              <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gap:8 }}>
                <label style={{ display:'flex',flexDirection:'column',gap:4,fontSize:10,color:'var(--text-3)',letterSpacing:'0.08em',textTransform:'uppercase' }}>
                  Station (lat,lon)<input className="inp mono" value={station} onChange={e=>setStation(e.target.value)}/>
                </label>
                <label style={{ display:'flex',flexDirection:'column',gap:4,fontSize:10,color:'var(--text-3)',letterSpacing:'0.08em',textTransform:'uppercase' }}>
                  Altitude (m)<input className="inp mono" value={alt} onChange={e=>setAlt(e.target.value)}/>
                </label>
              </div>
            </div>
          )}
        </div>
        <div className="modal-ftr">
          <div style={{ color:'var(--text-3)', fontSize:10.5, letterSpacing:'0.05em' }}>
            {ac ? <>SUMMARY: <strong style={{ color:'var(--text-0)' }}>{ac.callsign || ac.sub}</strong> · <strong style={{ color:'var(--text-0)' }}>{order.toUpperCase()}</strong>{order!=='rtb' && <> · STN <span className="mono">{station}</span> @ <span className="mono">{alt}m</span></>}</> : 'SELECT AIRCRAFT'}
          </div>
          <div style={{ display:'flex', gap:6 }}>
            <button className="btn" onClick={onClose}>Cancel</button>
            <button className="btn primary" disabled={!ac}
              onClick={()=>onSubmit({ cmd:'aircraft_order', aircraft_id:acId, order, params: order!=='rtb' ? { station: station.split(',').map(parseFloat), alt_m: parseFloat(alt) } : {} })}>
              ⎈ Transmit
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  NationsRail, RightRail, EventLog, Controls, LaunchOrderModal, FullInspectorModal,
  ShipOrderModal, AircraftOrderModal,
  formatNum, formatAlt, fmtLat, fmtLon, fmtDur,
});

</script><script type="text/babel">
const { useState: uS, useEffect: uE, useMemo: uM, useRef: uR, useCallback: uC } = React;

function App() {
  // --- Live connection state ---
  const [liveStatus, setLiveStatus] = uS('idle'); // idle|connecting|live|error|closed|fallback
  const [liveUrl, setLiveUrl] = uS(localStorage.getItem('nuke-sim-url') || 'ws://localhost:8765/stream');
  const [liveData, setLiveData] = uS(null); // {entities, cities, nations, events, metrics, hello} or null
  const [liveEnabled, setLiveEnabled] = uS(localStorage.getItem('nuke-sim-live') !== '0');
  const liveSeqRef = uR(0);

  // Decide data source — prefer live when connected, fallback to mock
  const useLive = liveEnabled && liveData && liveStatus === 'live';
  const nations = useLive ? liveData.nations : window.SimData.NATIONS;
  const cities = useLive ? liveData.cities : window.SimData.CITIES;
  const entities = useLive ? liveData.entities : window.SimData.ENT;
  const detonations = useLive
    ? (liveData.events.filter(e => e.kind === 'detonation').map(e => ({ ...(e.data||{}), t: e.t })))
    : window.SimData.DETONATIONS;
  const eventsAll = useLive ? liveData.events : window.SimData.EVENTS;
  const liveMetrics = useLive ? liveData.metrics : null;
  const maxT = 900;
  const t0 = useLive ? (liveData.hello?.sim_t0 || 0) : window.SimData.NOW_T;

  const [view, setView] = uS('ops');
  const [selId, setSelId] = uS(null);
  const [selectedNation, setSelectedNation] = uS('usa');
  const [logFilters, setLogFilters] = uS({});
  const [playing, setPlaying] = uS(true);
  const [playheadT, setPlayheadT] = uS(t0);
  const [timeScale, setTimeScale] = uS(1.0);
  const [showLaunchModal, setShowLaunchModal] = uS(false);
  const [showShipModal, setShowShipModal] = uS(false);
  const [showAircraftModal, setShowAircraftModal] = uS(false);
  const [fullInspectId, setFullInspectId] = uS(null);
  const [watchlist, setWatchlist] = uS(['wep-5','usn-ssbn-1']);
  const [stageSize, setStageSize] = uS({ w: 1000, h: 600 });
  const [wallclock, setWallclock] = uS(new Date('2026-04-20T18:13:00Z'));

  // Filter state
  const [filterClasses, setFilterClasses] = uS({
    silo: true, tel: true, sam_site: true, abm_site: true, radar_site: true, satellite_early_warning: true,
    icbm: true, slbm: true, cruise_alcm: true, cruise_slcm: true, cruise_glcm: true, mrbm: true, srbm: true,
    abm_interceptor: true, sam_interceptor: true,
    fighter: true, bomber: true, awacs: true, tanker: true,
    carrier: true, destroyer: true, cruiser: true, frigate: true,
    ssbn: true, ssn: true,
  });
  const [filterSides, setFilterSides] = uS({ usa: true, rus: true, chn: true, gbr: true, fra: true, prk: true, ind: true, pak: true, isr: true, irn: true });
  const [overlays, setOverlays] = uS({ arcs: true, domes: true, radar: true });

  // Resize stage to fit
  const stageRef = uR(null);
  uE(() => {
    function update() {
      if (!stageRef.current) return;
      const r = stageRef.current.getBoundingClientRect();
      setStageSize({ w: Math.max(400, r.width), h: Math.max(300, r.height) });
    }
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  // Persist playhead
  uE(() => {
    const saved = localStorage.getItem('nuke-sim-state');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.playheadT) setPlayheadT(s.playheadT);
        if (s.playing != null) setPlaying(s.playing);
        if (s.timeScale) setTimeScale(s.timeScale);
      } catch(e){}
    }
  }, []);
  uE(() => {
    localStorage.setItem('nuke-sim-state', JSON.stringify({ playheadT, playing, timeScale }));
  }, [playheadT, playing, timeScale]);

  // --- Live WebSocket connection ---
  uE(() => {
    if (!liveEnabled) {
      window.SimLive.disconnect();
      setLiveStatus('idle');
      setLiveData(null);
      return;
    }
    window.SimLive.connect({
      url: liveUrl,
      onStatus: (s) => setLiveStatus(s),
      onState: () => {
        // Snapshot at ≤10Hz to avoid excessive React churn
        const now = performance.now();
        if (now - (liveSeqRef.current || 0) < 100) return;
        liveSeqRef.current = now;
        setLiveData(window.SimLive.snapshot());
      },
      onEvents: () => setLiveData(window.SimLive.snapshot()),
      onMetrics: () => setLiveData(window.SimLive.snapshot()),
    });
    return () => window.SimLive.disconnect();
  }, [liveEnabled, liveUrl]);

  // Send pause/resume/time_scale to live server when toggled
  const dispatchSim = (cmd) => {
    if (liveEnabled && liveStatus === 'live') window.SimLive.send(cmd);
  };
  const setPlayingLive = (v) => {
    setPlaying(v);
    dispatchSim({ cmd: v ? 'resume' : 'pause' });
  };
  const setTimeScaleLive = (v) => {
    setTimeScale(v);
    dispatchSim({ cmd: 'set_time_scale', value: v });
  };

  // Playhead animation
  uE(() => {
    if (!playing) return;
    let last = performance.now();
    let raf;
    const loop = (now) => {
      const dt = (now - last) / 1000; last = now;
      setPlayheadT(t => Math.min(maxT, t + dt * timeScale));
      setWallclock(wc => new Date(wc.getTime() + dt * 1000 * timeScale));
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [playing, timeScale]);

  // Lookups
  const entitiesById = uM(() => Object.fromEntries(entities.map(e => [e.id, e])), [entities]);
  const citiesById = uM(() => Object.fromEntries(cities.map(c => [c.id, c])), [cities]);

  // Global metrics (computed from current data)
  const metrics = uM(() => {
    const missiles = entities.filter(e => ['icbm','slbm','mrbm','srbm','cruise_alcm','cruise_slcm','cruise_glcm'].includes(e.cls));
    const interceptors = entities.filter(e => ['abm_interceptor','sam_interceptor'].includes(e.cls));
    return {
      missiles_in_flight: missiles.length,
      warheads_in_flight: missiles.reduce((a, m) => a + (m.warheads_count || 1), 0),
      intercepts_attempted: 6,
      intercepts_successful: 1,
      detonations: detonations.length,
      estimated_casualties_total: 126500,
    };
  }, [entities, detonations]);

  // Filter cities: show capitals + cities near detonations always; others dimmed
  const visibleCities = cities;

  const handleAddWatch = (id) => {
    setWatchlist(w => w.includes(id) ? w : [...w, id]);
  };
  const handleRemoveWatch = (id) => setWatchlist(w => w.filter(x => x !== id));

  const handleSubmitOrder = (order) => {
    console.log('ORDER TRANSMITTED', order);
    setShowLaunchModal(false);
    if (liveEnabled && liveStatus === 'live') {
      window.SimLive.send(order);
    } else {
      alert('ORDER TRANSMITTED (MOCK — not connected)\n\n' + JSON.stringify(order, null, 2));
    }
  };
  const handleSubmitShip = (order) => {
    setShowShipModal(false);
    if (liveEnabled && liveStatus === 'live') window.SimLive.send(order);
    else alert('SHIP ORDER (MOCK)\n\n' + JSON.stringify(order, null, 2));
  };
  const handleSubmitAircraft = (order) => {
    setShowAircraftModal(false);
    if (liveEnabled && liveStatus === 'live') window.SimLive.send(order);
    else alert('AIRCRAFT ORDER (MOCK)\n\n' + JSON.stringify(order, null, 2));
  };

  const visibleEntitiesForFilter = {
    classes: filterClasses,
    sides: filterSides,
  };

  // Class filter groups
  const classGroups = [
    { key:'installations', label:'INSTALL', classes:['silo','tel','sam_site','abm_site','radar_site','satellite_early_warning'] },
    { key:'missiles',      label:'MSL',     classes:['icbm','slbm','mrbm','srbm','cruise_alcm','cruise_slcm','cruise_glcm'] },
    { key:'interceptors',  label:'INT',     classes:['abm_interceptor','sam_interceptor'] },
    { key:'aircraft',      label:'AIR',     classes:['fighter','bomber','awacs','tanker'] },
    { key:'naval',         label:'NAV',     classes:['carrier','destroyer','cruiser','frigate','ssbn','ssn'] },
  ];
  const toggleGroup = (grp) => {
    const anyOn = grp.classes.some(c => filterClasses[c]);
    const next = { ...filterClasses };
    grp.classes.forEach(c => next[c] = !anyOn);
    setFilterClasses(next);
  };

  const toggleSide = (side) => setFilterSides(s => ({ ...s, [side]: !s[side] }));

  return (
    <>
      <div className="app">
        {/* Header */}
        <header className="hdr">
          <div className="hdr-brand">
            <div className="hdr-brand-mark"/>
            <span>NUCLEAR CONFLICT SIM · SCN WW3_2030</span>
          </div>

          <div className="hdr-nav">
            {['ops','forces','intel','replay','scenarios'].map(v => (
              <button key={v} className={view===v?'active':''} onClick={()=>setView(v)}>
                {v[0].toUpperCase()+v.slice(1)}
              </button>
            ))}
          </div>

          <div className="hdr-clock">
            <div>
              <span className="lbl">T+ </span>
              <span className="val">{window.fmtDur(playheadT)}</span>
            </div>
            <div>
              <span className="lbl">WALLCLOCK </span>
              <span className="val">{wallclock.toISOString().slice(11,19)}Z</span>
            </div>
            <div>
              <span className="lbl">TICK </span>
              <span className="val">10Hz</span>
            </div>
          </div>

          <div className="hdr-defcon">
            <span className="dot"/> DEFCON 1 · GLOBAL
          </div>

          <div className="hdr-conn" onClick={()=>{
            const u = prompt('WebSocket URL (ws://host:port/stream):', liveUrl);
            if (u != null) {
              localStorage.setItem('nuke-sim-url', u);
              setLiveUrl(u);
            }
          }} title="Click to change WS URL · Shift-click to toggle live/mock"
             onMouseDown={(e)=>{
               if (e.shiftKey) {
                 e.preventDefault();
                 const next = !liveEnabled;
                 localStorage.setItem('nuke-sim-live', next?'1':'0');
                 setLiveEnabled(next);
               }
             }}
             style={{ cursor:'pointer' }}>
            <span className="dot" style={{
              background: liveStatus === 'live' ? 'var(--ok)' :
                          liveStatus === 'connecting' ? 'var(--warn)' :
                          liveStatus === 'closed' || liveStatus === 'error' ? 'var(--hot)' :
                          'var(--text-3)'
            }}/>
            {!liveEnabled ? 'MOCK DATA · live off' :
             liveStatus === 'live' ? <>WS LIVE · <span style={{ color:'var(--text-3)' }}>{liveUrl.replace(/^wss?:\/\//,'').replace('/stream','')}</span></> :
             liveStatus === 'connecting' ? <>CONNECTING · {liveUrl.replace(/^wss?:\/\//,'').replace('/stream','')}</> :
             liveStatus === 'closed' || liveStatus === 'error' ? <>WS DOWN · fallback mock</> :
             'WS IDLE'}
          </div>
        </header>

        {/* Left: nations */}
        <NationsRail nations={nations} selectedNation={selectedNation} onSelect={setSelectedNation}/>

        {/* Center: globe */}
        <div className="stage" ref={stageRef}>
          <div className="globe-wrap">
            <Globe
              width={stageSize.w} height={stageSize.h}
              nations={nations}
              cities={visibleCities}
              entities={entities}
              detonations={detonations}
              events={eventsAll}
              selectedId={selId}
              onSelect={setSelId}
              filters={visibleEntitiesForFilter}
              overlays={overlays}
              playheadT={playheadT}
              countriesData={window.COARSE_WORLD}
            />
          </div>

          {/* Top filter bar */}
          <div className="stage-top">
            <div className="filter-group">
              <span className="grp-label">CLS</span>
              {classGroups.map(g => {
                const on = g.classes.some(c => filterClasses[c]);
                return (
                  <button key={g.key} className={'tchip ' + (on ? 'on' : 'off')}
                    onClick={()=>toggleGroup(g)}>
                    {g.label}
                  </button>
                );
              })}
              <span className="grp-label" style={{ marginLeft: 6 }}>SIDE</span>
              {['usa','rus','chn','gbr','fra','prk','ind','pak'].map(s => (
                <button key={s} className={'tchip ' + (filterSides[s] ? 'on' : 'off')}
                  onClick={()=>toggleSide(s)}
                  style={{
                    borderColor: filterSides[s] ? (
                      ['usa','gbr','fra','isr','jpn','kor','aus'].includes(s) ? 'var(--friendly)' :
                      ['rus','chn','prk','irn'].includes(s) ? 'var(--hostile)' : 'var(--unknown)'
                    ) : undefined
                  }}>
                  {s.toUpperCase()}
                </button>
              ))}
            </div>
            <div className="filter-group">
              <span className="grp-label">OVL</span>
              <button className={'tchip ' + (overlays.arcs ? 'on' : 'off')}
                onClick={()=>setOverlays(o=>({ ...o, arcs:!o.arcs }))}>TRAJ</button>
              <button className={'tchip ' + (overlays.domes ? 'on' : 'off')}
                onClick={()=>setOverlays(o=>({ ...o, domes:!o.domes }))}>SAM/ABM DOME</button>
              <button className={'tchip ' + (overlays.radar ? 'on' : 'off')}
                onClick={()=>setOverlays(o=>({ ...o, radar:!o.radar }))}>RADAR</button>
            </div>
          </div>

          {/* Bottom-left compass / scale */}
          <div className="stage-compass">
            <div>PROJECTION ORTHOGRAPHIC · WGS84</div>
            <div>DRAG TO ROTATE · SHIFT+SCROLL TO ZOOM</div>
          </div>

          {/* Zoom controls */}
          <div style={{ position:'absolute', right:10, top:60, zIndex:5, display:'flex', flexDirection:'column', gap:2 }}>
            <button className="btn sm" style={{ width:28, padding:'4px 0' }} onClick={()=>window.dispatchEvent(new CustomEvent('globe-zoom',{detail:'in'}))}>+</button>
            <button className="btn sm" style={{ width:28, padding:'4px 0' }} onClick={()=>window.dispatchEvent(new CustomEvent('globe-zoom',{detail:'out'}))}>−</button>
            <button className="btn sm ghost" style={{ width:28, padding:'4px 0', fontSize:9 }} onClick={()=>window.dispatchEvent(new CustomEvent('globe-zoom',{detail:'reset'}))}>⟲</button>
          </div>

          {/* Global metrics panel */}
          <div className="stage-metrics">
            <h4>Global · {window.fmtDur(playheadT)}</h4>
            <div className="metric-row"><span className="k">Missiles in flight</span><span className="v warn">{metrics.missiles_in_flight}</span></div>
            <div className="metric-row"><span className="k">Warheads in flight</span><span className="v hot">{metrics.warheads_in_flight}</span></div>
            <div className="metric-row"><span className="k">Intercepts attempt</span><span className="v">{metrics.intercepts_attempted}</span></div>
            <div className="metric-row"><span className="k">Intercepts hit</span><span className="v ok">{metrics.intercepts_successful}</span></div>
            <div className="metric-row"><span className="k">Detonations</span><span className="v hot">{metrics.detonations}</span></div>
            <div className="metric-row"><span className="k">Est. casualties</span><span className="v hot">{window.formatNum(metrics.estimated_casualties_total)}</span></div>
          </div>
        </div>

        {/* Right rail */}
        <RightRail
          sel={selId}
          entitiesById={entitiesById}
          citiesById={citiesById}
          detonations={detonations}
          watchlist={watchlist}
          onOpenInspector={setFullInspectId}
          onAddWatch={handleAddWatch}
          onRemoveWatch={handleRemoveWatch}
        />

        {/* Bottom bar */}
        <div className="logbar">
          <EventLog
            events={eventsAll}
            playheadT={playheadT}
            filters={logFilters}
            onToggleFilter={(k)=>setLogFilters(f=>({ ...f, [k]: f[k] === false ? true : false }))}
            onEventClick={(e)=>{
              // jump focus
              if (e.actors && e.actors[0] && entitiesById[e.actors[0]]) setSelId(e.actors[0]);
            }}
          />
          <Controls
            playheadT={playheadT}
            maxT={maxT}
            playing={playing}
            timeScale={timeScale}
            onPlay={()=>setPlayingLive(true)}
            onPause={()=>setPlayingLive(false)}
            onStep={()=>{ setPlayheadT(t=>Math.min(maxT, t+1)); dispatchSim({ cmd:'step', ticks: 1 }); }}
            onScrub={(t)=>{ setPlayheadT(t); setPlayingLive(false); }}
            onScale={setTimeScaleLive}
            events={eventsAll}
            onOpenLaunchModal={()=>setShowLaunchModal(true)}
            onOpenShipModal={()=>setShowShipModal(true)}
            onOpenAircraftModal={()=>setShowAircraftModal(true)}
            onSaveState={()=>alert('STATE SAVED → snap_' + Date.now().toString(36) + '.json')}
          />
        </div>
      </div>

      {showLaunchModal && (
        <LaunchOrderModal
          nations={nations}
          targets={window.SimData.TARGETS_CATALOG}
          onClose={()=>setShowLaunchModal(false)}
          onSubmit={handleSubmitOrder}
        />
      )}

      {showShipModal && (
        <ShipOrderModal
          ships={entities.filter(e => ['carrier','destroyer','cruiser','frigate','ssbn','ssn','ssk'].includes(e.cls))}
          onClose={()=>setShowShipModal(false)}
          onSubmit={handleSubmitShip}
        />
      )}

      {showAircraftModal && (
        <AircraftOrderModal
          aircraft={entities.filter(e => ['fighter','bomber','awacs','tanker','elint','combat_uav','recon_uav'].includes(e.cls))}
          onClose={()=>setShowAircraftModal(false)}
          onSubmit={handleSubmitAircraft}
        />
      )}

      {fullInspectId && (
        <FullInspectorModal
          id={fullInspectId}
          entitiesById={entitiesById}
          citiesById={citiesById}
          detonations={detonations}
          onClose={()=>setFullInspectId(null)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script></body></html>
